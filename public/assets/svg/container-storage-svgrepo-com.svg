  <circle cx="52" cy="28" r="1.5" fill="white"/>

  <!-- Gear icon on middle -->
  <circle cx="50" cy="44" r="7" fill="none" stroke="#E63946" stroke-width="3"/>
  <path d="M43 44 L40 44 M50 37 L50 34 M57 44 L60 44 M50 51 L50 54"
        fill="none" stroke="#E63946" stroke-width="3" stroke-linecap="round"/>

  <!-- Stacking bumps on top of bottom container -->
