<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Container bottom -->
  <rect x="16" y="48" width="68" height="32" rx="5" fill="#FFF8E7" stroke="#2B2B2B" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Container middle -->
  <rect x="20" y="30" width="60" height="28" rx="4" fill="white" stroke="#2B2B2B" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Container top -->
  <rect x="24" y="14" width="52" height="24" rx="4" fill="#FFF8E7" stroke="#2B2B2B" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Docker whale silhouette on top container -->
  <path d="M36 28 C36 28 32 22 38 22 L62 22 C68 22 64 28 64 28"
