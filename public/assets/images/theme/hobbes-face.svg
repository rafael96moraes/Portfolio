<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Ears -->
  <ellipse cx="18" cy="28" rx="10" ry="12" fill="#E76F51" stroke="#2B2B2B" stroke-width="3"/>
  <ellipse cx="102" cy="28" rx="10" ry="12" fill="#E76F51" stroke="#2B2B2B" stroke-width="3"/>
  <ellipse cx="18" cy="28" rx="5" ry="7" fill="#F5E6C8"/>
  <ellipse cx="102" cy="28" rx="5" ry="7" fill="#F5E6C8"/>

  <!-- Head -->
  <circle cx="60" cy="58" r="42" fill="#E76F51" stroke="#2B2B2B" stroke-width="3.5"/>

  <!-- White muzzle -->
  <ellipse cx="60" cy="64" rx="26" ry="20" fill="#FFF8E7"/>
  <path d="M38 56 Q60 48 82 56" fill="none" stroke="#2B2B2B" stroke-width="3" stroke-linecap="round"/>

  <!-- Head stripes -->
  <path d="M42 22 Q50 14 58 22" fill="none" stroke="#2B2B2B" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M54 18 Q60 10 66 18" fill="none" stroke="#2B2B2B" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M68 22 Q76 14 78 22" fill="none" stroke="#2B2B2B" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M34 28 Q42 22 44 30" fill="none" stroke="#2B2B2B" stroke-width="3" stroke-linecap="round"/>
  <path d="M76 28 Q84 22 86 30" fill="none" stroke="#2B2B2B" stroke-width="3" stroke-linecap="round"/>

  <!-- Eyes (button style) -->
  <circle cx="44" cy="52" r="5" fill="#2B2B2B"/>
  <circle cx="76" cy="52" r="5" fill="#2B2B2B"/>

  <!-- Nose -->
  <ellipse cx="60" cy="65" rx="6" ry="4.5" fill="#2B2B2B"/>
  <ellipse cx="60" cy="64" rx="3" ry="2" fill="#555"/>

  <!-- Mouth -->
  <path d="M50 72 Q60 80 70 72" fill="none" stroke="#2B2B2B" stroke-width="3" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="36" y1="62" x2="18" y2="60" stroke="#2B2B2B" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="68" x2="18" y2="70" stroke="#2B2B2B" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="62" x2="102" y2="60" stroke="#2B2B2B" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="68" x2="102" y2="70" stroke="#2B2B2B" stroke-width="2" stroke-linecap="round"/>
</svg>
