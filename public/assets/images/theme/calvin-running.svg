<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Head -->
  <circle cx="30" cy="25" r="14" fill="#FFF8E7" stroke="#2B2B2B" stroke-width="2.5"/>

  <!-- Hair spikes -->
  <path d="M20 15 L16 2 L24 12" fill="#2B2B2B" stroke="none"/>
  <path d="M28 12 L30 0 L32 12" fill="#2B2B2B" stroke="none"/>
  <path d="M36 14 L42 2 L38 13" fill="#2B2B2B" stroke="none"/>

  <!-- Eyes -->
  <circle cx="25" cy="24" r="2.5" fill="#2B2B2B"/>
  <circle cx="35" cy="24" r="2.5" fill="#2B2B2B"/>

  <!-- Mouth (grin) -->
  <path d="M24 30 Q30 36 36 30" fill="none" stroke="#2B2B2B" stroke-width="2" stroke-linecap="round"/>

  <!-- Body (t-shirt) -->
  <path d="M18 38 L42 38 L46 60 L14 60 Z" fill="#E63946" stroke="#2B2B2B" stroke-width="2.5"/>

  <!-- Arms running -->
  <path d="M18 42 L6 32 L4 36" fill="none" stroke="#2B2B2B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M42 42 L54 52 L56 48" fill="none" stroke="#2B2B2B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Legs running -->
  <path d="M22 60 L14 74 L10 72" fill="none" stroke="#2B2B2B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M36 60 L44 72 L48 70" fill="none" stroke="#2B2B2B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Motion lines -->
  <line x1="54" y1="40" x2="65" y2="40" stroke="#2B2B2B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="46" x2="68" y2="46" stroke="#2B2B2B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="52" x2="62" y2="52" stroke="#2B2B2B" stroke-width="1.5" stroke-linecap="round"/>
</svg>
